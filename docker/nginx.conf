limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

upstream nextjs {
    server frontend:3000;
}

upstream api {
    server backend:8000;
}

# Redirect HTTP to HTTPS (production)
server {
    listen 80;
    server_name byrth.net www.byrth.net;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name byrth.net www.byrth.net;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/byrth.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/byrth.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Next.js frontend
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js HMR WebSocket (dev)
    location /_next/webpack-hmr {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API proxy
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting for public endpoints
        limit_req zone=api burst=20 nodelay;
    }

    # Health endpoint
    location /health {
        proxy_pass http://api;
    }

    # WebSocket proxy (SSH terminal, real-time feeds)
    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Swagger docs — restrict in production
    location /docs {
        proxy_pass http://api;
        # Uncomment to restrict to internal IPs:
        # allow 10.0.0.0/8;
        # deny all;
    }

    location /redoc {
        proxy_pass http://api;
    }

    location /openapi.json {
        proxy_pass http://api;
    }
}
