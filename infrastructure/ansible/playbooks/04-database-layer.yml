---
# Phase 4: PostgreSQL Primary + Replica with Patroni Failover

- name: Deploy PostgreSQL Primary (VM-DB-01)
  hosts: vm-db-01
  become: true
  vars:
    pg_version: 16
    pg_data: /var/lib/postgresql/16/main
    replication_user: replicator
    nexgen_db_password: "{{ lookup('env', 'NEXGEN_DB_PASSWORD') | default(lookup('file', '/root/.nexgen-secrets', errors='ignore') | regex_search('NEXGEN_DB_PASSWORD=(.+)', '\\1') | first | default('changeme_nexgen'), true) }}"
    replication_password: "{{ lookup('env', 'REPLICATION_PASSWORD') | default(lookup('file', '/root/.nexgen-secrets', errors='ignore') | regex_search('REPLICATION_PASSWORD=(.+)', '\\1') | first | default('changeme_replication'), true) }}"

  tasks:
    - name: Install PostgreSQL 16
      apt:
        name:
          - postgresql-16
          - postgresql-client-16
          - postgresql-16-pgvector
        state: present
        update_cache: true

    - name: Configure postgresql.conf for primary
      lineinfile:
        path: /etc/postgresql/{{ pg_version }}/main/postgresql.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?listen_addresses', line: "listen_addresses = '*'" }
        - { regexp: '^#?wal_level', line: 'wal_level = replica' }
        - { regexp: '^#?max_wal_senders', line: 'max_wal_senders = 5' }
        - { regexp: '^#?wal_keep_size', line: 'wal_keep_size = 1024' }
        - { regexp: '^#?max_connections', line: 'max_connections = 100' }
        - { regexp: '^#?shared_buffers', line: 'shared_buffers = 3GB' }
        - { regexp: '^#?effective_cache_size', line: 'effective_cache_size = 9GB' }
        - { regexp: '^#?work_mem', line: 'work_mem = 32MB' }
        - { regexp: '^#?archive_mode', line: 'archive_mode = on' }
        - { regexp: '^#?archive_command', line: "archive_command = 'cp %p /var/lib/postgresql/wal_archive/%f'" }
      notify: restart postgresql

    - name: Configure pg_hba.conf for replication
      lineinfile:
        path: /etc/postgresql/{{ pg_version }}/main/pg_hba.conf
        line: "{{ item }}"
      loop:
        - "host replication {{ replication_user }} 10.20.0.0/24 scram-sha-256"
        - "host all all 10.20.0.0/24 scram-sha-256"
      notify: restart postgresql

    - name: Create WAL archive directory
      file:
        path: /var/lib/postgresql/wal_archive
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Create platform database
      become_user: postgres
      community.postgresql.postgresql_db:
        name: nexgen_platform
        encoding: UTF-8

    - name: Create platform user
      become_user: postgres
      community.postgresql.postgresql_user:
        name: nexgen
        password: "{{ nexgen_db_password }}"
        db: nexgen_platform
        priv: ALL

    - name: Create replication user
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ replication_user }}"
        password: "{{ replication_password }}"
        role_attr_flags: REPLICATION,LOGIN

    - name: Enable pgvector extension
      become_user: postgres
      community.postgresql.postgresql_ext:
        name: vector
        db: nexgen_platform

    - name: Install postgres_exporter for Prometheus
      apt:
        name: prometheus-postgres-exporter
        state: present

  handlers:
    - name: restart postgresql
      systemd:
        name: postgresql
        state: restarted


- name: Deploy PostgreSQL Replica (VM-DB-02)
  hosts: vm-db-02
  become: true
  vars:
    pg_version: 16
    primary_host: 10.20.0.20
    replication_user: replicator
    replication_password: "{{ lookup('env', 'REPLICATION_PASSWORD') | default(lookup('file', '/root/.nexgen-secrets', errors='ignore') | regex_search('REPLICATION_PASSWORD=(.+)', '\\1') | first | default('changeme_replication'), true) }}"

  tasks:
    - name: Install PostgreSQL 16
      apt:
        name:
          - postgresql-16
          - postgresql-client-16
        state: present
        update_cache: true

    - name: Stop PostgreSQL for base backup
      systemd:
        name: postgresql
        state: stopped

    - name: Remove existing data directory
      file:
        path: /var/lib/postgresql/{{ pg_version }}/main
        state: absent

    - name: Run pg_basebackup from primary
      become_user: postgres
      command: >
        pg_basebackup -h {{ primary_host }} -U {{ replication_user }}
        -D /var/lib/postgresql/{{ pg_version }}/main
        -Fp -Xs -P -R
      environment:
        PGPASSWORD: "{{ replication_password }}"

    - name: Configure hot standby
      lineinfile:
        path: /var/lib/postgresql/{{ pg_version }}/main/postgresql.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?hot_standby', line: 'hot_standby = on' }
        - { regexp: '^#?primary_conninfo', line: "primary_conninfo = 'host={{ primary_host }} port=5432 user={{ replication_user }} password={{ replication_password }}'" }

    - name: Start PostgreSQL replica
      systemd:
        name: postgresql
        state: started
        enabled: true
