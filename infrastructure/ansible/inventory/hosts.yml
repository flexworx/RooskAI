---
# Murph.AI NexGen Platform — Ansible Inventory
# Based on VM Inventory v1.1 (78GB total, 128GB hardware)

all:
  vars:
    ansible_user: deploy
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    proxmox_node: r7625
    domain: nexgen.local

  children:
    proxmox:
      hosts:
        r7625:
          ansible_host: 192.168.4.58
          ansible_user: root

    management:
      hosts:
        vm-fw-01:
          ansible_host: 192.168.4.1
          vm_role: firewall
          vlan: all
          ram_mb: 4096
          cpu_cores: 2
        vm-iam-01:
          ansible_host: 192.168.4.20
          vm_role: keycloak
          vlan: 10
          ram_mb: 8192
          cpu_cores: 4
        vm-sec-01:
          ansible_host: 192.168.4.30
          vm_role: vault
          vlan: 10
          ram_mb: 6144
          cpu_cores: 2
        vm-siem-01:
          ansible_host: 192.168.4.40
          vm_role: wazuh
          vlan: 10
          ram_mb: 10240
          cpu_cores: 4
        vm-mon-01:
          ansible_host: 192.168.4.50
          vm_role: monitoring
          vlan: 10
          ram_mb: 8192
          cpu_cores: 4

    control_plane:
      hosts:
        vm-app-01:
          ansible_host: 10.20.0.10
          vm_role: platform
          vlan: 20
          ram_mb: 12288
          cpu_cores: 8
        vm-db-01:
          ansible_host: 10.20.0.20
          vm_role: postgresql_primary
          vlan: 20
          ram_mb: 12288
          cpu_cores: 4
        vm-db-02:
          ansible_host: 10.20.0.21
          vm_role: postgresql_replica
          vlan: 20
          ram_mb: 8192
          cpu_cores: 4
        vm-git-01:
          ansible_host: 10.20.0.30
          vm_role: gitea
          vlan: 20
          ram_mb: 6144
          cpu_cores: 2

    dmz:
      hosts:
        vm-proxy-01:
          ansible_host: 172.16.40.10
          vm_role: reverse_proxy
          vlan: 40
          ram_mb: 4096
          cpu_cores: 2
